services:
  - type: web
    name: sentinel-anpr
    runtime: python
    rootDir: backend
    buildCommand: >-
      pip install -r requirements.txt &&
      pip install -e . &&
      python scripts/build_frontend_bundle.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/health
    envVars:
      - key: SENTINEL_ENV
        value: production
      - key: SENTINEL_VISION_PROVIDER
        value: huggingface
      - key: SENTINEL_DATABASE_URL
        value: sqlite:///./data/sentinel_anpr.db
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: google/gemma-3-4b-it:deepinfra
      - key: HF_API_URL
        value: https://router.huggingface.co/v1/chat/completions
      - key: SENTINEL_AUTH_JWT_SECRET
        generateValue: true
      - key: SENTINEL_CORS_ORIGINS
        value: https://vehicle-number-plate-detection-rho.vercel.app
      - key: SENTINEL_FRONTEND_URL
        value: https://vehicle-number-plate-detection-rho.vercel.app
